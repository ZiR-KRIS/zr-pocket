<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Círculo Modal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#000; --panel:#070707; --panel2:#0c0c0c; --line:#1c1c1c; --line2:#2a2a2a;
    --purple:#9b30ff; --purple-dim:#3d1266; --purple-glow:#c97aff; --purple-lbl:#c097ff;
    --yellow:#f5c500; --yellow-dim:#5c4a00; --yellow-glow:#ffe566; --yellow-lbl:#c9a800;
    --green:#00e676; --green-dim:#004d26; --green-glow:#69ffb4; --green-lbl:#00a855;
    --accent:#ff3cac; --accent-glow:#ff8fd0;
    --bright:#fff; --dim:#444; --dim2:#666;
  }
  body{background:var(--bg);color:var(--bright);font-family:'Rajdhani','Bahnschrift','Arial Narrow',sans-serif;
    -webkit-font-smoothing:antialiased;padding:26px 18px 54px;line-height:1.5;}
  .wrap{max-width:820px;margin:0 auto;}
  header{margin-bottom:8px;}
  h1{font-family:'Share Tech Mono',Consolas,monospace;font-weight:300;font-size:14px;
     letter-spacing:.35em;text-transform:uppercase;color:#555;}
  .sub{font-family:'Share Tech Mono',Consolas,monospace;font-size:11px;letter-spacing:.18em;
     text-transform:uppercase;color:var(--dim);margin-top:6px;}
  .tabs{display:flex;gap:4px;margin:22px 0 20px;border-bottom:1px solid var(--line);}
  .tab{appearance:none;border:none;background:none;color:var(--dim2);
     font-family:'Share Tech Mono',Consolas,monospace;font-size:12px;letter-spacing:.2em;
     text-transform:uppercase;padding:11px 16px;cursor:pointer;
     border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s;}
  .tab:hover{color:#aaa;}
  .tab.on{color:var(--bright);border-bottom-color:var(--accent);text-shadow:0 0 12px rgba(255,60,172,.5);}
  .tab .num{color:var(--accent);margin-right:7px;opacity:.8;}
  .layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:30px;align-items:start;}
  @media(max-width:640px){.layout{grid-template-columns:1fr;}}
  .panel{min-width:0;}
  .stage{display:flex;flex-direction:column;align-items:center;}
  svg{width:100%;max-width:440px;height:auto;display:block;overflow:visible;}
  .controls{display:flex;flex-direction:column;gap:16px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label,.rlabel,.legend,.tag,.meterhdr{font-family:'Share Tech Mono',Consolas,monospace;
     font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}
  select{appearance:none;background:var(--panel2);color:var(--bright);border:1px solid var(--line2);
     border-radius:3px;padding:10px 34px 10px 13px;font-family:'Rajdhani','Bahnschrift','Arial Narrow',sans-serif;font-weight:600;
     font-size:15px;cursor:pointer;transition:.18s;
     background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%23666' stroke-width='1.5' stroke-linecap='round'/></svg>");
     background-repeat:no-repeat;background-position:right 13px center;}
  select:hover{border-color:#444;}
  select:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 1px var(--purple),0 0 16px rgba(155,48,255,.35);}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .scaleblock{border:1px solid var(--line);border-radius:4px;padding:14px;background:var(--panel);}
  .scaleblock h3{font-family:'Share Tech Mono',Consolas,monospace;font-weight:400;font-size:11px;
     letter-spacing:.2em;text-transform:uppercase;margin:0 0 12px;display:flex;align-items:center;gap:9px;color:#999;}
  .swatch{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none;}
  .toggle{display:flex;align-items:center;gap:10px;font-family:'Share Tech Mono',Consolas,monospace;
     font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim2);cursor:pointer;user-select:none;}
  .toggle input{position:absolute;opacity:0;width:0;height:0;}
  .track{width:36px;height:18px;border-radius:2px;background:var(--panel2);border:1px solid var(--line2);position:relative;transition:.18s;flex:none;}
  .knob{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:1px;background:var(--dim2);transition:.18s;}
  .toggle input:checked + .track{background:rgba(255,60,172,.2);border-color:var(--accent);}
  .toggle input:checked + .track .knob{transform:translateX(18px);background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .rlabel{margin:20px 0 9px;color:#888;}
  .notes{display:flex;flex-wrap:wrap;gap:7px;}
  .note-pill{font-family:'Rajdhani','Bahnschrift','Arial Narrow',sans-serif;font-weight:700;font-size:16px;padding:4px 12px;
     border-radius:3px;background:var(--panel2);border:1px solid var(--line2);color:#bbb;}
  .note-pill.tonic{border-color:var(--accent);color:var(--accent-glow);box-shadow:0 0 12px rgba(255,60,172,.25);}
  .charnote{font-family:'Share Tech Mono',Consolas,monospace;font-size:11px;letter-spacing:.06em;color:var(--dim2);margin-top:11px;}
  .charnote b{color:var(--accent-glow);font-weight:400;}
  .chords{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  @media(max-width:480px){.chords{grid-template-columns:repeat(4,1fr);}}
  .chord{border-radius:3px;padding:9px 3px;text-align:center;border:1px solid;background:var(--panel2);}
  .chord .deg{font-family:'Share Tech Mono',Consolas,monospace;font-size:10px;letter-spacing:.05em;opacity:.85;}
  .chord .nm{font-family:'Rajdhani','Bahnschrift','Arial Narrow',sans-serif;font-weight:700;font-size:14px;margin-top:3px;white-space:nowrap;color:#eee;}
  .pill-major{border-color:var(--purple);background:rgba(155,48,255,.12);} .pill-major .deg{color:var(--purple-glow);}
  .pill-minor{border-color:var(--yellow);background:rgba(245,197,0,.10);} .pill-minor .deg{color:var(--yellow-glow);}
  .pill-dim{border-color:var(--green);background:rgba(0,230,118,.10);} .pill-dim .deg{color:var(--green-glow);}
  .pill-aug{border-color:var(--accent);background:rgba(255,60,172,.10);} .pill-aug .deg{color:var(--accent-glow);}
  .pivots{display:flex;flex-direction:column;gap:13px;}
  .tag{display:block;margin-bottom:6px;}
  .meter{margin-top:20px;}
  .meterbar{height:6px;border-radius:2px;background:var(--panel2);overflow:hidden;border:1px solid var(--line2);}
  .meterfill{height:100%;background:var(--accent);box-shadow:0 0 12px var(--accent);transition:width .25s;}
  .meterlabel{font-family:'Rajdhani','Bahnschrift','Arial Narrow',sans-serif;font-weight:600;font-size:14px;color:#ccc;margin-top:9px;}
  .meterlabel b{color:var(--accent-glow);font-weight:700;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:16px;justify-content:center;}
  .legend span{display:inline-flex;align-items:center;gap:7px;color:var(--dim2);}
  .hint{font-family:'Share Tech Mono',Consolas,monospace;font-size:10.5px;letter-spacing:.05em;line-height:1.7;color:var(--dim);margin-top:16px;}
  .hint b{color:var(--accent);font-weight:400;}
  .dtier{font-family:'Share Tech Mono',Consolas,monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#888;margin:16px 0 7px;}
  .dtier b{color:var(--accent-glow);font-weight:400;}
  .dests{display:flex;flex-wrap:wrap;gap:6px;}
  .dest{appearance:none;cursor:pointer;font-family:'Rajdhani','Bahnschrift','Arial Narrow',sans-serif;
     font-weight:600;font-size:14px;padding:6px 11px;border-radius:3px;background:var(--panel2);
     border:1px solid var(--line2);color:#bbb;transition:.15s;}
  .dest:hover{border-color:#555;color:#fff;}
  .dest.on{border-color:var(--accent);color:var(--accent-glow);background:rgba(255,60,172,.08);box-shadow:0 0 10px rgba(255,60,172,.3);}
  details.adv{margin-top:18px;border-top:1px solid var(--line);padding-top:12px;}
  details.adv summary{cursor:pointer;list-style:none;font-family:'Share Tech Mono',Consolas,monospace;
     font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim2);}
  details.adv summary::-webkit-details-marker{display:none;}
  details.adv summary::before{content:'+ ';color:var(--accent);}
  details.adv[open] summary::before{content:'\2212 ';}
  .btn-tejer{appearance:none;cursor:pointer;align-self:flex-start;background:none;border:1px solid var(--accent);
     color:var(--accent-glow);font-family:'Share Tech Mono',Consolas,monospace;font-size:11px;letter-spacing:.2em;
     text-transform:uppercase;padding:9px 16px;border-radius:3px;transition:.18s;}
  .btn-tejer:hover{background:rgba(255,60,172,.12);box-shadow:0 0 14px rgba(255,60,172,.3);}
  .firma{margin-top:34px;text-align:center;font-family:'Share Tech Mono',Consolas,monospace;
     font-size:11px;letter-spacing:.35em;color:#555;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Círculo Modal</h1>
    <div class="sub">casa · modo · tejido — diatónica / melódica / armónica</div>
  </header>
  <div class="tabs" id="tabs">
    <button class="tab on" data-t="casa"><span class="num">01</span>Círculo</button>
    <button class="tab" data-t="modo"><span class="num">02</span>Modo</button>
    <button class="tab" data-t="tejido"><span class="num">03</span>Tejido</button>
  </div>
  <div class="layout">
    <div class="panel stage">
      <svg id="wheel" viewBox="0 0 460 460" role="img" aria-label="Rueda de quintas"></svg>
      <div class="legend" id="legend"></div>
    </div>
    <div class="panel">
      <div class="controls" id="controls"></div>
      <div class="readout" id="readout"></div>
    </div>
  </div>
  <div class="firma">ZiR</div>
</div>

<script>
"use strict";
/* ---------------- core music engine (validated) ---------------- */
const LETTERS=['C','D','E','F','G','A','B'];
const NAT_PC={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const ACC={'-2':'\u266D\u266D','-1':'\u266D','0':'','1':'\u266F','2':'\u266F\u266F'};
const ROOTS=[
 ['C','C',0,0],['D\u266D','D',-1,1],['D','D',0,2],['E\u266D','E',-1,3],['E','E',0,4],
 ['F','F',0,5],['F\u266F','F',1,6],['G','G',0,7],['A\u266D','A',-1,8],['A','A',0,9],
 ['B\u266D','B',-1,10],['B','B',0,11]
].map(([name,letter,acc,pc])=>({name,letter,acc,pc}));
const FAMILIES={
 'Diat\u00f3nica (mayor)':[
  ['J\u00f3nico (mayor)',[0,2,4,5,7,9,11]],['D\u00f3rico',[0,2,3,5,7,9,10]],
  ['Frigio',[0,1,3,5,7,8,10]],['Lidio',[0,2,4,6,7,9,11]],['Mixolidio',[0,2,4,5,7,9,10]],
  ['E\u00f3lico (menor)',[0,2,3,5,7,8,10]],['Locrio',[0,1,3,5,6,8,10]],
 ],
 'Menor mel\u00f3dica':[
  ['Menor mel\u00f3dica',[0,2,3,5,7,9,11]],['D\u00f3rico \u266D2',[0,1,3,5,7,9,10]],
  ['Lidio aumentado',[0,2,4,6,8,9,11]],['Lidio dominante',[0,2,4,6,7,9,10]],
  ['Mixolidio \u266D6',[0,2,4,5,7,8,10]],['Locrio \u266E2',[0,2,3,5,6,8,10]],
  ['Alterado',[0,1,3,4,6,8,10]],
 ],
 'Menor arm\u00f3nica':[
  ['Menor arm\u00f3nica',[0,2,3,5,7,8,11]],['Locrio \u266E6',[0,1,3,5,6,9,10]],
  ['J\u00f3nico \u266F5',[0,2,4,5,8,9,11]],['D\u00f3rico \u266F4',[0,2,3,6,7,9,10]],
  ['Frigio dominante',[0,1,4,5,7,8,10]],['Lidio \u266F2',[0,3,4,6,7,9,11]],
  ['Superlocrio \u266D\u266D7',[0,1,3,4,6,8,9]],
 ],
};
const FAM_KEYS=Object.keys(FAMILIES);
const CHAR={
 'D\u00f3rico':'la 6\u00aa mayor \u2014 menor con luz','Frigio':'la \u266D2 \u2014 oscuro, espa\u00f1ol',
 'Lidio':'la \u266F4 \u2014 flotante, et\u00e9reo','Mixolidio':'la \u266D7 \u2014 mayor con tierra',
 'E\u00f3lico (menor)':'menor natural','Locrio':'la \u266D5 \u2014 inestable',
 'Mixolidio \u266D6':'mayor c\u00e1lido con sombra \u2014 el atardecer',
 'Lidio dominante':'\u266F4 + \u266D7 \u2014 brillante y terroso',
 'Frigio dominante':'3\u00aa mayor sobre base oscura \u2014 flamenco',
 'Lidio aumentado':'\u266F4 + \u266F5 \u2014 suspendido','Alterado':'todo tensionado \u2014 dominante alterado',
 'Locrio \u266E2':'semidisminuido \u2014 jazz menor','D\u00f3rico \u266D2':'menor con \u266D2 \u2014 tenso y suave',
 'Menor mel\u00f3dica':'menor con 6\u00aa y 7\u00aa mayores','Menor arm\u00f3nica':'la 7\u00aa mayor \u2014 dram\u00e1tica',
};
function spellScale(root,intervals){
 const ri=LETTERS.indexOf(root.letter);
 return intervals.map((iv,deg)=>{
  const pc=(root.pc+iv)%12; const letter=LETTERS[(ri+deg)%7];
  let d=((pc-NAT_PC[letter])%12+12)%12; if(d>6)d-=12;
  return {pc,name:letter+(ACC[d]||'')};
 });
}
const TRIAD={'4-7':'','3-7':'m','3-6':'\u00b0','4-8':'+'};
function triadQ(n,i){const r=n[i].pc,t=((n[(i+2)%7].pc-r)%12+12)%12,f=((n[(i+4)%7].pc-r)%12+12)%12;return TRIAD[t+'-'+f]||'';}
const SEV={'4-7':{11:'maj7',10:'7'},'3-7':{10:'m7',11:'m(maj7)'},'3-6':{10:'m7\u266D5',9:'\u00b07'},'4-8':{11:'maj7\u266F5',10:'7\u266F5'}};
function sevQ(n,i){const r=n[i].pc,t=((n[(i+2)%7].pc-r)%12+12)%12,f=((n[(i+4)%7].pc-r)%12+12)%12,s=((n[(i+6)%7].pc-r)%12+12)%12;return (SEV[t+'-'+f]&&SEV[t+'-'+f][s])||'';}
function qualClass(q){return q===''?'pill-major':q==='m'?'pill-minor':q==='\u00b0'?'pill-dim':'pill-aug';}
const ROMAN=['I','II','III','IV','V','VI','VII'];
function romanFor(n,i){const q=triadQ(n,i);let r=ROMAN[i];if(q==='m'||q==='\u00b0')r=r.toLowerCase();if(q==='\u00b0')r+='\u00b0';if(q==='+')r+='+';return r;}
function compare(a,b){const A=new Set(a.map(n=>n.pc)),B=new Set(b.map(n=>n.pc));
 return {shared:[...A].filter(pc=>B.has(pc)),aOnly:[...A].filter(pc=>!B.has(pc)),bOnly:[...B].filter(pc=>!A.has(pc))};}
function smoothness(c){return c>=7?'id\u00e9nticas':c===6?'muy suave \u00b7 una nota se mueve':c===5?'suave \u00b7 dos notas':c===4?'media \u00b7 tres notas':c===3?'marcada \u00b7 cuatro notas':'salto \u00b7 escalas lejanas';}

/* ---------------- sector wheel rendering ---------------- */
const CX=230, CY=230;
const R_OUT=182, R_MID=150, R_IN=116, R_DIM=80, R_HUB=52;
const FIFTHS=[0,7,2,9,4,11,6,1,8,3,10,5];
const NEUTRAL={0:'C',7:'G',2:'D',9:'A',4:'E',11:'B',6:'F\u266F',1:'D\u266D',8:'A\u266D',3:'E\u266D',10:'B\u266D',5:'F'};
const REL_MIN={0:'Am',7:'Em',2:'Bm',9:'F\u266Fm',4:'C\u266Fm',11:'G\u266Fm',6:'D\u266Fm',1:'B\u266Dm',8:'Fm',3:'Cm',10:'Gm',5:'Dm'};
const DIM_NAME={0:'B\u00b0',7:'F\u266F\u00b0',2:'C\u266F\u00b0',9:'G\u266F\u00b0',4:'D\u266F\u00b0',11:'A\u266F\u00b0',6:'E\u266F\u00b0',1:'C\u00b0',8:'G\u00b0',3:'D\u00b0',10:'A\u00b0',5:'E\u00b0'};
const ACC_CT={0:'0',7:'1\u266F',2:'2\u266F',9:'3\u266F',4:'4\u266F',11:'5\u266F',6:'6\u266F',1:'5\u266D',8:'4\u266D',3:'3\u266D',10:'2\u266D',5:'1\u266D'};
const SVGNS="http://www.w3.org/2000/svg";

function el(tag,attrs,txt){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);if(txt!=null)e.textContent=txt;return e;}
function polar(r,deg){const a=(deg-90)*Math.PI/180;return [CX+r*Math.cos(a),CY+r*Math.sin(a)];}
function sectorPath(r1,r2,center,span){
 const gap=1.6, s=center-span/2+gap, e=center+span/2-gap;
 const [x1,y1]=polar(r2,s),[x2,y2]=polar(r2,e),[x3,y3]=polar(r1,e),[x4,y4]=polar(r1,s);
 return `M${x1},${y1} A${r2},${r2} 0 0 1 ${x2},${y2} L${x3},${y3} A${r1},${r1} 0 0 0 ${x4},${y4} Z`;
}
function glowDefs(svg){
 const defs=el('defs',{});
 [['gP','#9b30ff',5],['gY','#f5c500',5],['gG','#00e676',5],['gPk','#ff3cac',5]].forEach(([id,c,sd])=>{
  const f=el('filter',{id:id,x:'-60%',y:'-60%',width:'220%',height:'220%'});
  f.appendChild(el('feGaussianBlur',{in:'SourceGraphic',stdDeviation:sd,result:'b'}));
  const m=el('feMerge',{});m.appendChild(el('feMergeNode',{in:'b'}));m.appendChild(el('feMergeNode',{in:'SourceGraphic'}));
  f.appendChild(m);defs.appendChild(f);
 });
 svg.appendChild(defs);
}
function ticks(svg){
 for(let i=0;i<12;i++){const a=(-90+i*30+15)*Math.PI/180;
  const x1=CX+(R_OUT+5)*Math.cos(a),y1=CY+(R_OUT+5)*Math.sin(a),x2=CX+(R_OUT+12)*Math.cos(a),y2=CY+(R_OUT+12)*Math.sin(a);
  svg.appendChild(el('line',{x1:x1,y1:y1,x2:x2,y2:y2,stroke:'#262626','stroke-width':1}));}
}
function hub(svg,l1,l2){
 svg.appendChild(el('circle',{cx:CX,cy:CY,r:R_HUB,fill:'#050505',stroke:'#1a1a1a','stroke-width':1}));
 if(l1) svg.appendChild(el('text',{x:CX,y:CY+(l2?-7:0),'text-anchor':'middle','dominant-baseline':'central',fill:'#cfcfcf','font-family':"'Rajdhani','Bahnschrift','Arial Narrow',sans-serif",'font-weight':'700','font-size':'22px'},l1));
 if(l2) svg.appendChild(el('text',{x:CX,y:CY+12,'text-anchor':'middle','dominant-baseline':'central',fill:'#3a3a3a','font-family':"'Share Tech Mono',Consolas,monospace",'font-size':'8.5px','letter-spacing':'.15em'},l2));
}
function lbl(svg,r,deg,txt,fill,size,mono,op){
 const [x,y]=polar(r,deg);
 const a={x:x,y:y,'text-anchor':'middle','dominant-baseline':'central',fill:fill,'font-size':size+'px','font-family':mono?"'Share Tech Mono',Consolas,monospace":"'Rajdhani','Bahnschrift','Arial Narrow',sans-serif",'font-weight':mono?'400':'700'};
 if(op!=null)a.opacity=op;
 svg.appendChild(el('text',a,txt));
}
function clearWheel(){const s=document.getElementById('wheel');while(s.firstChild)s.removeChild(s.firstChild);return s;}

/* ---- CASA: 3-ring circle of fifths with diatonic fan ---- */
function casaState(activeK){
 // returns per (ring,k) => 'root' | 'scale' | null
 const m={};
 if(activeK==null) return m;
 const mod=n=>((n%12)+12)%12;
 m['maj-'+activeK]='root'; m['min-'+activeK]='root'; m['dim-'+activeK]='root';
 m['maj-'+mod(activeK-1)]='scale'; m['maj-'+mod(activeK+1)]='scale';
 m['min-'+mod(activeK-1)]='scale'; m['min-'+mod(activeK+1)]='scale';
 return m;
}
function drawCasa(activeK){
 const svg=clearWheel(); glowDefs(svg); ticks(svg);
 const st=casaState(activeK);
 const rings=[
  {key:'maj',r1:R_MID,r2:R_OUT,lr:(R_MID+R_OUT)/2,base:'#3d1266',rootC:'#9b30ff',scaleC:'#5a1a99',glow:'gP',name:p=>NEUTRAL[p],lc:'#c097ff',fs:15},
  {key:'min',r1:R_IN,r2:R_MID,lr:(R_IN+R_MID)/2,base:'#5c4a00',rootC:'#f5c500',scaleC:'#8a7000',glow:'gY',name:p=>REL_MIN[p],lc:'#c9a800',fs:12},
  {key:'dim',r1:R_DIM,r2:R_IN,lr:(R_DIM+R_IN)/2,base:'#004d26',rootC:'#00e676',scaleC:'#007040',glow:'gG',name:p=>DIM_NAME[p],lc:'#00a855',fs:9.5},
 ];
 for(let k=0;k<12;k++){
  const pc=FIFTHS[k], center=k*30;
  rings.forEach(rg=>{
   const state=st[rg.key+'-'+k];
   let fill=rg.base, op=1, glow=null, lblFill=rg.lc, lblOp=1;
   if(activeK!=null){
    if(state==='root'){fill=rg.rootC;glow=rg.glow;lblFill='#fff';}
    else if(state==='scale'){fill=rg.scaleC;lblFill=rg.lc;lblOp=.8;}
    else {op=.06;lblOp=.06;}
   }
   const p=el('path',{d:sectorPath(rg.r1,rg.r2,center,30),fill:fill,stroke:'#000','stroke-width':1.5,opacity:op,style:'cursor:pointer;transition:opacity .25s'});
   if(glow)p.setAttribute('filter','url(#'+glow+')');
   p.addEventListener('mouseenter',()=>{drawCasa(k);casaReadout(k);});
   p.addEventListener('mouseleave',()=>{drawCasa(state2.casa);casaReadout(state2.casa);});
   p.addEventListener('click',()=>{state2.casa=(state2.casa===k?null:k);drawCasa(state2.casa);casaReadout(state2.casa);});
   svg.appendChild(p);
   lbl(svg,rg.lr,center,rg.name(pc),lblFill,rg.fs,false,lblOp);
  });
  // accidental count under major label
  const accOp = activeK==null?1:(st['maj-'+k]?(st['maj-'+k]==='root'?.9:.5):.06);
  lbl(svg,(R_MID+R_OUT)/2+13,center,ACC_CT[pc],'#777',7,true,accOp);
 }
 hub(svg,'5THS');
}
function casaReadout(k){
 const read=document.getElementById('readout');
 if(k==null){read.innerHTML=`<div class="hint">Pasa o toca una tonalidad. El abanico diatónico se ilumina: <b>la tónica al máximo</b>, sus relativas y vecinas en intensidad media. <b style="color:var(--purple)">mayor</b> · <b style="color:var(--yellow)">menor</b> · <b style="color:var(--green)">disminuido</b>.</div>`;return;}
 const mod=n=>((n%12)+12)%12;
 const pc=FIFTHS[k], pm=FIFTHS[mod(k-1)], pp=FIFTHS[mod(k+1)];
 const grades=[
  ['I',NEUTRAL[pc],'pill-major'],['ii',REL_MIN[pm],'pill-minor'],['iii',REL_MIN[pp],'pill-minor'],
  ['IV',NEUTRAL[pm],'pill-major'],['V',NEUTRAL[pp],'pill-major'],['vi',REL_MIN[pc],'pill-minor'],['vii\u00b0',DIM_NAME[pc],'pill-dim'],
 ];
 read.innerHTML=`<div class="rlabel">${NEUTRAL[pc]} mayor · ${ACC_CT[pc]}</div>
  <div class="chords">${grades.map(g=>`<div class="chord ${g[2]}"><div class="deg">${g[0]}</div><div class="nm">${g[1]}</div></div>`).join('')}</div>
  <div class="hint" style="margin-top:14px">Los siete acordes diatónicos de la tonalidad.</div>`;
}

/* ---- MODO / TEJIDO: note-wedge wheel ---- */
function ringGuides(svg){[R_OUT,R_MID,R_IN,R_DIM].forEach(r=>svg.appendChild(el('circle',{cx:CX,cy:CY,r:r,fill:'none',stroke:'#121212','stroke-width':1})));}
function drawScale(spelled,rootPc){
 const svg=clearWheel(); glowDefs(svg); ticks(svg); ringGuides(svg);
 const set=new Set(spelled.map(n=>n.pc)); const nm={}; spelled.forEach(n=>nm[n.pc]=n.name);
 let rootName='';
 for(let k=0;k<12;k++){
  const pc=FIFTHS[k],center=k*30,lit=set.has(pc),tonic=pc===rootPc;
  let fill,stroke,tcol,glow=null;
  if(lit){fill='#2a0d47';stroke='#9b30ff';tcol='#e8d4ff';glow='gP';}
  else {fill='#080808';stroke='#161616';tcol='#333';}
  if(tonic&&lit){fill='#52103a';stroke='#ff3cac';tcol='#fff';glow='gPk';rootName=nm[pc];}
  const p=el('path',{d:sectorPath(R_DIM,R_OUT,center,30),fill:fill,stroke:stroke,'stroke-width':lit?1.5:1});
  if(glow)p.setAttribute('filter','url(#'+glow+')');
  svg.appendChild(p);
  lbl(svg,(R_DIM+R_OUT)/2,center, lit?nm[pc]:NEUTRAL[pc], tcol, lit?17:13,false, lit?1:1);
 }
 hub(svg,rootName||'','T\u00d3NICA');
}
function drawTejido(a,b){
 const svg=clearWheel(); glowDefs(svg); ticks(svg); ringGuides(svg);
 const A=new Set(a.map(n=>n.pc)),B=new Set(b.map(n=>n.pc)); const nm={}; a.concat(b).forEach(n=>{if(!(n.pc in nm))nm[n.pc]=n.name;});
 let shared=0;
 for(let k=0;k<12;k++){
  const pc=FIFTHS[k],center=k*30,inA=A.has(pc),inB=B.has(pc);
  let fill,stroke,tcol,glow=null;
  if(inA&&inB){fill='#52103a';stroke='#ff3cac';tcol='#fff';glow='gPk';shared++;}
  else if(inA){fill='#2a0d47';stroke='#9b30ff';tcol='#e8d4ff';glow='gP';}
  else if(inB){fill='#063322';stroke='#00e676';tcol='#c9ffe6';glow='gG';}
  else {fill='#080808';stroke='#161616';tcol='#333';}
  const p=el('path',{d:sectorPath(R_DIM,R_OUT,center,30),fill:fill,stroke:stroke,'stroke-width':(inA||inB)?1.5:1});
  if(glow)p.setAttribute('filter','url(#'+glow+')');
  svg.appendChild(p);
  lbl(svg,(R_DIM+R_OUT)/2,center,(inA||inB)?nm[pc]:NEUTRAL[pc],tcol,(inA||inB)?16:13,false,1);
 }
 hub(svg,shared+'/7','PIVOTES');
}

/* ---------------- state + UI ---------------- */
const state2={
 tab:'casa', casa:null,
 modo:{root:'G',fam:FAM_KEYS[0],mode:0,sevenths:false},
 tej:{a:{root:'G',fam:'Menor mel\u00f3dica',mode:4},b:null,keepTonic:false,adv:false},
};
function rootObj(name){return ROOTS.find(r=>r.name===name);}
function opt(v,l,s){return `<option value="${v}"${s?' selected':''}>${l}</option>`;}
function rootOptions(s){return ROOTS.map(r=>opt(r.name,r.name,r.name===s)).join('');}
function famOptions(s){return FAM_KEYS.map(f=>opt(f,f,f===s)).join('');}
function modeOptions(fam,s){return FAMILIES[fam].map((m,i)=>opt(i,m[0],i===s)).join('');}
function selectTab(t){state2.tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));render();}

function render(){
 const ctrl=document.getElementById('controls'),leg=document.getElementById('legend');
 if(state2.tab==='casa'){
  ctrl.innerHTML=`<div class="hint">El círculo de quintas completo. Tres anillos por sector: <b style="color:var(--purple)">mayor</b>, <b style="color:var(--yellow)">relativa menor</b> y <b style="color:var(--green)">disminuido</b>. Pasa o toca para encender el abanico diatónico.</div>`;
  leg.innerHTML=`<span><span class="swatch" style="background:var(--purple)"></span>mayor</span><span><span class="swatch" style="background:var(--yellow)"></span>menor rel.</span><span><span class="swatch" style="background:var(--green)"></span>disminuido</span>`;
  drawCasa(state2.casa); casaReadout(state2.casa); return;
 }
 if(state2.tab==='modo'){
  const s=state2.modo;
  ctrl.innerHTML=`
   <div class="field"><label>Tónica</label><select id="m-root">${rootOptions(s.root)}</select></div>
   <div class="field"><label>Familia</label><select id="m-fam">${famOptions(s.fam)}</select></div>
   <div class="field"><label>Modo</label><select id="m-mode">${modeOptions(s.fam,s.mode)}</select></div>
   <label class="toggle"><input type="checkbox" id="m-sev"${s.sevenths?' checked':''}><span class="track"><span class="knob"></span></span>séptimas</label>
   <button class="btn-tejer" id="m-tejer">tejer desde acá →</button>`;
  const root=rootObj(s.root),iv=FAMILIES[s.fam][s.mode][1],modeName=FAMILIES[s.fam][s.mode][0],notes=spellScale(root,iv);
  drawScale(notes,root.pc);
  leg.innerHTML=`<span><span class="swatch" style="background:var(--purple)"></span>notas del modo</span><span><span class="swatch" style="background:var(--accent)"></span>tónica</span>`;
  const chordHTML=notes.map((n,i)=>{const tq=triadQ(notes,i),q=s.sevenths?sevQ(notes,i):tq;return `<div class="chord ${qualClass(tq)}"><div class="deg">${romanFor(notes,i)}</div><div class="nm">${n.name}${q}</div></div>`;}).join('');
  const char=CHAR[modeName];
  document.getElementById('readout').innerHTML=`
   <div class="rlabel">${root.name} · ${modeName}</div>
   <div class="notes">${notes.map(n=>`<span class="note-pill${n.pc===root.pc?' tonic':''}">${n.name}</span>`).join('')}</div>
   ${char?`<div class="charnote">color · <b>${char}</b></div>`:''}
   <div class="rlabel">Acordes por grado · ${s.sevenths?'séptimas':'tríadas'}</div>
   <div class="chords">${chordHTML}</div>`;
  bindModo(); return;
 }
 /* TEJIDO — mapa de destinos */
 const t=state2.tej,ra=rootObj(t.a.root);
 const na=spellScale(ra,FAMILIES[t.a.fam][t.a.mode][1]);
 const all=destinos(na,ra);
 const list=t.keepTonic?all.filter(d=>d.root===t.a.root):all;
 if(!t.b) t.b=list[0]?{root:list[0].root,fam:list[0].fam,mode:list[0].mode}:{...t.a};
 const TIER={7:'mismas notas · cambio de centro',6:'se mueve una nota',5:'se mueven dos notas',4:'se mueven tres notas'};
 const CAP={7:12,6:12,5:8};
 const seen={};let destHTML='',cur=null;
 list.forEach(d=>{
  if(!t.keepTonic&&d.shared<5)return;
  seen[d.shared]=(seen[d.shared]||0)+1; if(seen[d.shared]>(CAP[d.shared]||6))return;
  if(d.shared!==cur){if(cur!==null)destHTML+='</div>';cur=d.shared;
   destHTML+=`<div class="dtier"><b>${d.shared}/7</b> · ${TIER[d.shared]||'salto'}</div><div class="dests">`;}
  destHTML+=`<button class="dest${sameDest(d,t.b)?' on':''}" data-root="${d.root}" data-fam="${d.fam}" data-mode="${d.mode}">${d.root} ${d.name}</button>`;
 });
 if(cur!==null)destHTML+='</div>';
 ctrl.innerHTML=`
  <div class="scaleblock"><h3><span class="swatch" style="background:var(--purple)"></span>Estoy en</h3>
   <div class="two"><div class="field"><label>Tónica</label><select id="a-root">${rootOptions(t.a.root)}</select></div>
   <div class="field"><label>Familia</label><select id="a-fam">${famOptions(t.a.fam)}</select></div></div>
   <div class="field" style="margin-top:10px"><label>Modo</label><select id="a-mode">${modeOptions(t.a.fam,t.a.mode)}</select></div></div>
  <label class="toggle"><input type="checkbox" id="t-keep"${t.keepTonic?' checked':''}><span class="track"><span class="knob"></span></span>solo mi tónica (${t.a.root})</label>
  <div class="destwrap">${destHTML}</div>
  <div class="hint">Toca un destino para ver el cruce. Arriba = más <b>suave</b>.</div>
  <details class="adv"${t.adv?' open':''}><summary>destino manual</summary>
   <div class="two" style="margin-top:12px"><div class="field"><label>Tónica</label><select id="b-root">${rootOptions(t.b.root)}</select></div>
   <div class="field"><label>Familia</label><select id="b-fam">${famOptions(t.b.fam)}</select></div></div>
   <div class="field" style="margin-top:10px"><label>Modo</label><select id="b-mode">${modeOptions(t.b.fam,t.b.mode)}</select></div></details>`;
 leg.innerHTML=`<span><span class="swatch" style="background:var(--accent)"></span>pivotes</span><span><span class="swatch" style="background:var(--purple)"></span>solo A</span><span><span class="swatch" style="background:var(--green)"></span>solo B</span>`;
 tejidoCompare(t.b);
 bindTejido();
}
function sameDest(d,b){return !!b&&d.root===b.root&&d.fam===b.fam&&d.mode===b.mode;}
function fifthDist(p1,p2){const d=Math.abs(FIFTHS.indexOf(p1)-FIFTHS.indexOf(p2));return Math.min(d,12-d);}
function destinos(na,ra){
 const t=state2.tej,A=new Set(na.map(n=>n.pc)),out=[];
 ROOTS.forEach(r=>FAM_KEYS.forEach(f=>FAMILIES[f].forEach((m,mi)=>{
  if(r.name===t.a.root&&f===t.a.fam&&mi===t.a.mode)return;
  const shared=[...new Set(spellScale(r,m[1]).map(n=>n.pc))].filter(pc=>A.has(pc)).length;
  out.push({root:r.name,fam:f,mode:mi,name:m[0],shared,fd:fifthDist(ra.pc,r.pc)});
 })));
 out.sort((x,y)=>y.shared-x.shared||x.fd-y.fd);
 return out;
}
function tejidoCompare(b){
 const t=state2.tej,ra=rootObj(t.a.root),rb=rootObj(b.root);
 const na=spellScale(ra,FAMILIES[t.a.fam][t.a.mode][1]),nb=spellScale(rb,FAMILIES[b.fam][b.mode][1]);
 drawTejido(na,nb);
 const c=compare(na,nb),byPc={}; na.concat(nb).forEach(n=>{if(!(n.pc in byPc))byPc[n.pc]=n.name;});
 const pills=arr=>arr.length?arr.map(pc=>`<span class="note-pill">${byPc[pc]}</span>`).join(''):'<span style="color:#333">—</span>';
 const pct=Math.round(c.shared.length/7*100);
 document.getElementById('readout').innerHTML=`
  <div class="rlabel">${ra.name} ${FAMILIES[t.a.fam][t.a.mode][0]} &nbsp;⇄&nbsp; ${rb.name} ${FAMILIES[b.fam][b.mode][0]}</div>
  <div class="pivots">
   <div><span class="tag" style="color:var(--accent-glow)">Pivotes · el tejido</span><div class="notes">${pills(c.shared)}</div></div>
   <div><span class="tag" style="color:var(--purple-glow)">Sueltas · solo A</span><div class="notes">${pills(c.aOnly)}</div></div>
   <div><span class="tag" style="color:var(--green-glow)">Entran · solo B</span><div class="notes">${pills(c.bOnly)}</div></div></div>
  <div class="meter"><div class="meterhdr" style="margin-bottom:8px">Cercanía del cruce</div>
   <div class="meterbar"><div class="meterfill" style="width:${pct}%"></div></div>
   <div class="meterlabel">${c.shared.length} de 7 compartidas — <b>${smoothness(c.shared.length)}</b></div></div>`;
}
function bindModo(){const s=state2.modo;
 document.getElementById('m-root').onchange=e=>{s.root=e.target.value;render();};
 document.getElementById('m-fam').onchange=e=>{s.fam=e.target.value;s.mode=0;render();};
 document.getElementById('m-mode').onchange=e=>{s.mode=+e.target.value;render();};
 document.getElementById('m-sev').onchange=e=>{s.sevenths=e.target.checked;render();};
 document.getElementById('m-tejer').onclick=()=>{state2.tej.a={root:s.root,fam:s.fam,mode:s.mode};state2.tej.b=null;selectTab('tejido');};}
function bindTejido(){const t=state2.tej;
 document.getElementById('a-root').onchange=e=>{t.a.root=e.target.value;t.b=null;render();};
 document.getElementById('a-fam').onchange=e=>{t.a.fam=e.target.value;t.a.mode=0;t.b=null;render();};
 document.getElementById('a-mode').onchange=e=>{t.a.mode=+e.target.value;t.b=null;render();};
 document.getElementById('t-keep').onchange=e=>{t.keepTonic=e.target.checked;t.b=null;render();};
 document.querySelectorAll('.dest').forEach(btn=>{
  const d={root:btn.dataset.root,fam:btn.dataset.fam,mode:+btn.dataset.mode,name:''};
  btn.onclick=()=>{t.b={root:d.root,fam:d.fam,mode:d.mode};render();};
  btn.onmouseenter=()=>tejidoCompare(d);
  btn.onmouseleave=()=>tejidoCompare(t.b);
 });
 const adv=document.querySelector('details.adv'); if(adv)adv.ontoggle=()=>{t.adv=adv.open;};
 document.getElementById('b-root').onchange=e=>{t.b={root:e.target.value,fam:t.b.fam,mode:t.b.mode};render();};
 document.getElementById('b-fam').onchange=e=>{t.b={root:t.b.root,fam:e.target.value,mode:0};render();};
 document.getElementById('b-mode').onchange=e=>{t.b={root:t.b.root,fam:t.b.fam,mode:+e.target.value};render();};}
document.getElementById('tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(b)selectTab(b.dataset.t);});
render();
</script>
